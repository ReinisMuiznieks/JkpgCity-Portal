<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/favicons/favicon.ico" sizes="any" />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="/favicons/favicon-16x16.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/favicons/favicon-32x32.png"
    />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/favicons/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="192x192"
      href="/favicons/android-chrome-192x192.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="512x512"
      href="/favicons/android-chrome-512x512.png"
    />
    <link rel="manifest" href="/favicons/site.webmanifest" />
    <title>Home - JkpgCity Portal</title>
    <link rel="stylesheet" href="/css/styles.css" />
    <link rel="stylesheet" href="/pages/stores/stores.css" />
    <link rel="stylesheet" href="/components/shared/navbar/navbar.css" />
  </head>
  <body>
    <!-- Navbar placeholder -->
    <header id="navbar"></header>

    <!-- Page content -->
    <main id="content">
      <section class="hero container">
        <h1>
          Discover <br />
          Jönköping City
        </h1>
        <p>
          Shop, dine, go to museum, see concerts and a lot more. Jkpg City has a
          lot to offer anyone looking for a good time.
        </p>
      </section>

      <section class="controls">
        <div class="filters-container">
          <select id="district-filter">
            <option value="">All Districts</option>
            <option value="Öster">Öster</option>
            <option value="Väster">Väster</option>
            <option value="Atollen">Atollen</option>
            <option value="Tändsticksområdet">Tändsticksområdet</option>
            <option value="Resecentrum">Resecentrum</option>
          </select>

          <div class="sorting-container">
            <select id="sorting">
              <option value="az">Sort by name: A-Z</option>
              <option value="district">Sort by: District</option>
            </select>
          </div>
          <div class="add-container">
            <button
              id="add-store-button"
              style="display: none"
              class="btn-add-store"
            >
              Add Store
            </button>
          </div>
        </div>
      </section>

      <section class="grid"></section>
    </main>

    <script src="/js/shared.js"></script>
    <script src="/js/stores.js"></script>
  </body>
</html>
