    <title>Add/Edit Venues</title>
    <link rel="stylesheet" href="/css/styles.css" />
    <link rel="stylesheet" href="/pages/store-form/store-form.css" />
    <link rel="stylesheet" href="/components/shared/navbar/navbar.css" />
  </head>
  <body>
    <!-- Navbar placeholder -->
    <header id="navbar"></header>

    <!-- Page content -->
    <main id="content">
      <section class="hero container">
        <h1>Add Venue</h1>
        <p>Add, delete, edit, or sort venues in Jönköping City.</p>
      </section>

      <section class="form-container">
        <form id="add-venue-form">
          <div class="form-grid">
            <div class="form-group">
              <label for="venue-name">Name of Venue</label>
              <input type="text" id="venue-name" name="name" />
            </div>

            <div class="form-group">
              <label for="url">url</label>
              <input type="text" id="url" name="url" />
            </div>

            <div class="form-group description-group">
              <label for="description">Description</label>
              <textarea
                type="text"
                id="description"
                name="description"
                rows="5"
              ></textarea>
            </div>

            <div class="form-group">
              <label for="district">District</label>
              <input type="text" id="district" name="district" />
            </div>

            <div class="form-group">
              <label for="type">Type</label>
              <input type="text" id="type" name="type" />
            </div>
          </div>
          <div class="button-wrapper">
            <button type="submit" id="btn-submit-store" class="btn-add-form">
              Add Venue
            </button>
          </div>
        </form>
      </section>
    </main>

    <script src="/js/shared.js"></script>
    <script src="/js/store-form.js"></script>
  </body>
</html>
